name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Build frontend
        working-directory: Frontend
        run: |
          echo "VITE_API_BASE_URL=https://emotions-guide.ru" > .env.production
          npm ci
          npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload files
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "venv" \
            --exclude "Frontend/node_modules" \
            --exclude "backend/.env" \
            --exclude "backend/serviceAccountKey.json" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/emotions-guide/

      - name: Restart backend
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            cd /var/www/emotions-guide &&
            printf "%s" "${{ secrets.BACKEND_ENV }}" > backend/.env &&
            echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > backend/serviceAccountKey.json &&
            chmod 600 backend/.env backend/serviceAccountKey.json &&
            ./venv/bin/python -m json.tool backend/serviceAccountKey.json > /dev/null &&
            python3 -m venv venv &&
            ./venv/bin/pip install --upgrade pip &&
            ./venv/bin/pip install -r backend/requirements.txt &&
            sudo systemctl restart emotions-guide &&
            sleep 2 &&
            sudo systemctl is-active --quiet emotions-guide
          '
