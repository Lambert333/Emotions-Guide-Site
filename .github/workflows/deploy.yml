name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Build frontend
        working-directory: Frontend
        run: |
          set -euo pipefail
          echo "VITE_API_BASE_URL=https://emotions-guide.ru" > .env.production
          npm ci --prefer-offline --no-audit --no-fund
          npm run build

      - name: Setup SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload files
        run: |
          set -euo pipefail
          rsync -az --delete \
            --exclude ".env" \
            --exclude "serviceAccountKey.json" \
            backend/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/emotions-guide/backend/

          rsync -az --delete \
            Frontend/dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/emotions-guide/Frontend/dist/

      - name: Install backend and restart service
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.SSH_PORT }}" ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} '
            set -euo pipefail
            cd /var/www/emotions-guide

            test -x ./venv/bin/python || python3 -m venv venv
            ./venv/bin/pip install --disable-pip-version-check -r backend/requirements.txt

            printf "%s" "${{ secrets.BACKEND_ENV }}" > backend/.env
            echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > backend/serviceAccountKey.json

            chmod 600 backend/.env backend/serviceAccountKey.json
            ./venv/bin/python -m json.tool backend/serviceAccountKey.json > /dev/null
            PYTHONPATH=/var/www/emotions-guide ./venv/bin/python -c "import backend.main; print(\"backend import ok\")"

            sudo -n systemctl restart emotions-guide
            sleep 2
            sudo -n systemctl is-active --quiet emotions-guide
            curl -fsS http://127.0.0.1:8000/docs > /dev/null
          '
